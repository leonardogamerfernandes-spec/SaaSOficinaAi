version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: oficinaai
      POSTGRES_PASSWORD: oficinaai_secret
      POSTGRES_DB: oficinaai
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oficinaai -d oficinaai"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_dev:
